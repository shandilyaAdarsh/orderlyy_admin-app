<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TableOS — Role Selection</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary-fixed-dim": "#83d0f6",
                    "surface-container": "#eceeef",
                    "surface-container-low": "#f2f4f5",
                    "on-tertiary-container": "#c1e9ff",
                    "primary-fixed": "#ffdad7",
                    "on-error-container": "#93000a",
                    "on-primary-fixed": "#410004",
                    "tertiary": "#00536e",
                    "on-tertiary-fixed": "#001e2b",
                    "secondary": "#515f74",
                    "error": "#ba1a1a",
                    "on-secondary-fixed": "#0d1c2e",
                    "on-primary-container": "#ffdad7",
                    "secondary-fixed-dim": "#b9c7df",
                    "surface-container-high": "#e6e8e9",
                    "inverse-primary": "#ffb3ae",
                    "surface-dim": "#d8dadb",
                    "inverse-on-surface": "#eff1f2",
                    "background": "#f8fafb",
                    "primary": "#9d0518",
                    "tertiary-fixed": "#c0e8ff",
                    "secondary-container": "#d5e3fc",
                    "outline-variant": "#e3bebb",
                    "on-secondary-fixed-variant": "#3a485b",
                    "on-surface": "#191c1d",
                    "surface": "#f8fafb",
                    "surface-container-lowest": "#ffffff",
                    "error-container": "#ffdad6",
                    "surface-tint": "#b72028",
                    "on-primary-fixed-variant": "#930015",
                    "on-primary": "#ffffff",
                    "outline": "#8f706d",
                    "surface-bright": "#f8fafb",
                    "on-secondary-container": "#57657a",
                    "on-secondary": "#ffffff",
                    "primary-container": "#c0272d",
                    "on-tertiary": "#ffffff",
                    "surface-container-highest": "#e1e3e4",
                    "on-error": "#ffffff",
                    "on-background": "#191c1d",
                    "on-surface-variant": "#5a403e",
                    "tertiary-container": "#006d8f",
                    "on-tertiary-fixed-variant": "#004d66",
                    "inverse-surface": "#2e3132",
                    "secondary-fixed": "#d5e3fc",
                    "surface-variant": "#e1e3e4",
                    "primary-fixed-dim": "#ffb3ae"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Inter"],
                    "body": ["Inter"],
                    "label": ["Inter"],
                    "mono": ["JetBrains Mono"]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-glass {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
        }
        .crimson-shadow {
            box-shadow: 0 12px 32px -8px rgba(157, 5, 24, 0.08);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface selection:bg-primary-container selection:text-on-primary">
<main class="min-h-screen flex flex-col items-center justify-between p-6 max-w-lg mx-auto overflow-hidden">
<!-- Top Section (35% approx) -->
<section class="w-full flex flex-col items-center justify-center pt-12 pb-8 space-y-6">
<div class="flex items-center justify-center h-8 w-8 text-primary">
<span class="material-symbols-outlined text-3xl" data-icon="restaurant_menu">restaurant_menu</span>
</div>
<div class="text-center space-y-2">
<h1 class="text-[26px] font-bold text-on-surface tracking-tight">Welcome to TableOS</h1>
<p class="text-secondary text-base">Who are you today?</p>
</div>
</section>
<!-- Role Cards Section -->
<section class="w-full flex flex-col gap-4 flex-grow">
<!-- Card 1: Admin / Owner -->
<button class="group w-full text-left bg-surface-container-lowest p-6 rounded-xl border-l-[3px] border-primary-container crimson-shadow transition-all duration-200 active:scale-[0.98] flex items-center justify-between">
<div class="flex items-center gap-5">
<div class="w-12 h-12 rounded-full flex items-center justify-center bg-[#C0272D15] text-primary-container">
<span class="material-symbols-outlined" data-icon="admin_panel_settings">admin_panel_settings</span>
</div>
<div>
<h2 class="text-lg font-bold text-on-surface">Admin / Owner</h2>
<p class="text-sm text-secondary">Full restaurant control</p>
</div>
</div>
<span class="material-symbols-outlined text-primary-container transition-transform group-hover:translate-x-1" data-icon="arrow_forward">arrow_forward</span>
</button>
<!-- Card 2: Staff -->
<button class="group w-full text-left bg-surface-container-lowest p-6 rounded-xl border-l-[3px] border-secondary-container crimson-shadow transition-all duration-200 active:scale-[0.98] flex items-center justify-between">
<div class="flex items-center gap-5">
<div class="w-12 h-12 rounded-full flex items-center justify-center bg-surface-container-low text-secondary">
<span class="material-symbols-outlined" data-icon="groups">groups</span>
</div>
<div>
<h2 class="text-lg font-bold text-on-surface">Staff</h2>
<p class="text-sm text-secondary">Waiter · Manager</p>
</div>
</div>
<span class="material-symbols-outlined text-secondary transition-transform group-hover:translate-x-1" data-icon="arrow_forward">arrow_forward</span>
</button>
</section>
<!-- Footer -->
<footer class="w-full py-8 text-center">
<div class="inline-flex flex-col items-center">
<span class="text-[10px] uppercase tracking-widest text-secondary/60 font-medium">Powered by</span>
<span class="text-xs font-black text-secondary/80 tracking-tighter">TableOS</span>
</div>
</footer>
</main>
<!-- Visual Accents: Subtle Glass Orbs (Abstract Background Elements) -->
<div class="fixed top-[-10%] right-[-10%] w-64 h-64 bg-primary/5 rounded-full blur-[80px] -z-10"></div>
<div class="fixed bottom-[-10%] left-[-10%] w-64 h-64 bg-tertiary-container/5 rounded-full blur-[80px] -z-10"></div>
</body></html>
