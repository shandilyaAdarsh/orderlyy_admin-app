<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Admin Login - TableOS</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary-fixed-dim": "#83d0f6",
                    "surface-container": "#eceeef",
                    "surface-container-low": "#f2f4f5",
                    "on-tertiary-container": "#c1e9ff",
                    "primary-fixed": "#ffdad7",
                    "on-error-container": "#93000a",
                    "on-primary-fixed": "#410004",
                    "tertiary": "#00536e",
                    "on-tertiary-fixed": "#001e2b",
                    "secondary": "#515f74",
                    "error": "#ba1a1a",
                    "on-secondary-fixed": "#0d1c2e",
                    "on-primary-container": "#ffdad7",
                    "secondary-fixed-dim": "#b9c7df",
                    "surface-container-high": "#e6e8e9",
                    "inverse-primary": "#ffb3ae",
                    "surface-dim": "#d8dadb",
                    "inverse-on-surface": "#eff1f2",
                    "background": "#f8fafb",
                    "primary": "#9d0518",
                    "tertiary-fixed": "#c0e8ff",
                    "secondary-container": "#d5e3fc",
                    "outline-variant": "#e3bebb",
                    "on-secondary-fixed-variant": "#3a485b",
                    "on-surface": "#191c1d",
                    "surface": "#f8fafb",
                    "surface-container-lowest": "#ffffff",
                    "error-container": "#ffdad6",
                    "surface-tint": "#b72028",
                    "on-primary-fixed-variant": "#930015",
                    "on-primary": "#ffffff",
                    "outline": "#8f706d",
                    "surface-bright": "#f8fafb",
                    "on-secondary-container": "#57657a",
                    "on-secondary": "#ffffff",
                    "primary-container": "#c0272d",
                    "on-tertiary": "#ffffff",
                    "surface-container-highest": "#e1e3e4",
                    "on-error": "#ffffff",
                    "on-background": "#191c1d",
                    "on-surface-variant": "#5a403e",
                    "tertiary-container": "#006d8f",
                    "on-tertiary-fixed-variant": "#004d66",
                    "inverse-surface": "#2e3132",
                    "secondary-fixed": "#d5e3fc",
                    "surface-variant": "#e1e3e4",
                    "primary-fixed-dim": "#ffb3ae"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Inter"],
                    "body": ["Inter"],
                    "label": ["Inter"],
                    "mono": ["JetBrains Mono"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .fill-icon {
            font-variation-settings: 'FILL' 1;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-white shadow-sm">
<div class="flex items-center gap-4">
<button class="transition-all duration-200 active:scale-95 text-slate-500 hover:bg-slate-50 p-2 rounded-full">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="headline-lg font-bold Inter tracking-tight text-red-700">Admin Login</h1>
</div>
<div class="flex items-center">
<span class="text-2xl font-black text-red-700">TableOS</span>
</div>
</header>
<main class="flex-1 mt-16 flex flex-col items-center justify-center px-6 py-12">
<div class="w-full max-w-[440px] space-y-8">
<!-- Branding Section -->
<div class="flex flex-col items-center text-center space-y-4">
<div class="w-20 h-20 rounded-2xl bg-primary/5 flex items-center justify-center text-primary-container">
<span class="material-symbols-outlined !text-[48px] fill-icon">shield_person</span>
</div>
<div class="space-y-1">
<h2 class="text-3xl font-bold tracking-tight text-on-surface">Welcome back</h2>
<p class="text-secondary font-medium">Sign in to manage your restaurant</p>
</div>
</div>
<!-- Login Method Options -->
<div class="space-y-4">
<!-- Social Login 1 -->
<button class="w-full h-[52px] bg-surface-container-lowest flex items-center px-6 rounded-xl shadow-[0_12px_32px_-8px_rgba(157,5,24,0.05)] transition-all active:scale-[0.98] hover:bg-surface-container-low group">
<div class="w-6 h-6 mr-4 flex items-center justify-center">
<svg height="20" viewbox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"></path></svg>
</div>
<span class="font-semibold text-[#0F172A]">Continue with Google</span>
</button>
<!-- Social Login 2 -->
<button class="w-full h-[52px] bg-surface-container-lowest flex items-center px-6 rounded-xl shadow-[0_12px_32px_-8px_rgba(157,5,24,0.05)] transition-all active:scale-[0.98] hover:bg-surface-container-low">
<span class="material-symbols-outlined text-secondary mr-4">smartphone</span>
<span class="font-semibold text-[#0F172A]">Continue with Phone Number</span>
</button>
<!-- Divider -->
<div class="relative flex items-center py-4">
<div class="flex-grow border-t border-surface-container-highest"></div>
<span class="flex-shrink mx-4 text-xs font-mono font-bold text-slate-400 tracking-widest uppercase">or</span>
<div class="flex-grow border-t border-surface-container-highest"></div>
</div>
<!-- Form Section -->
<div class="bg-surface-container-lowest p-8 rounded-xl shadow-[0_12px_32px_-8px_rgba(157,5,24,0.08)] border-l-[3px] border-primary-container">
<div class="flex items-center gap-3 mb-6">
<span class="material-symbols-outlined text-primary-container fill-icon">key</span>
<h3 class="title-md font-semibold text-on-surface">Login with ID &amp; Password</h3>
</div>
<form class="space-y-6">
<div class="space-y-2">
<label class="label-md font-medium text-secondary block">Restaurant ID</label>
<div class="relative">
<input class="w-full h-[52px] bg-surface border-0 border-b-2 border-surface-container-high focus:border-primary-container focus:ring-0 px-4 rounded-t-lg transition-all font-mono" placeholder="R-100234" type="text"/>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="label-md font-medium text-secondary block">Password</label>
<button class="text-xs font-bold text-primary-container uppercase tracking-tight" type="button">Forgot?</button>
</div>
<div class="relative">
<input class="w-full h-[52px] bg-surface border-0 border-b-2 border-surface-container-high focus:border-primary-container focus:ring-0 px-4 rounded-t-lg transition-all" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<button class="w-full h-[52px] bg-primary-container text-on-primary font-semibold rounded-lg shadow-lg shadow-primary/20 transition-all active:scale-[0.97] flex items-center justify-center gap-2 mt-2" type="submit">
<span>Login to Dashboard</span>
<span class="material-symbols-outlined text-sm">login</span>
</button>
</form>
</div>
</div>
<!-- Footer Trouble -->
<div class="text-center pt-4">
<a class="text-sm font-medium text-secondary hover:text-primary transition-colors inline-block" href="#">
                    Having trouble? <span class="text-primary-container underline underline-offset-4 decoration-2 decoration-primary-container/30">Contact Support</span>
</a>
</div>
</div>
</main>
<!-- Visual Accents (Editorial Style) -->
<div class="fixed bottom-0 right-0 w-64 h-64 opacity-5 pointer-events-none -z-10 translate-x-1/4 translate-y-1/4">
<div class="w-full h-full bg-primary rounded-full blur-[80px]"></div>
</div>
<div class="fixed top-0 left-0 w-96 h-96 opacity-[0.03] pointer-events-none -z-10 -translate-x-1/3 -translate-y-1/3">
<div class="w-full h-full bg-primary rounded-full blur-[100px]"></div>
</div>
</body></html>
